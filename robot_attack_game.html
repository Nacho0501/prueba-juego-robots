<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Attack - Interactive Wall Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        /* Interfaz de Usuario superior */
        #ui-layer {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 5;
        }
        .stat {
            font-size: 40px;
            font-weight: 900;
            text-shadow: 0 0 15px #00f2ff;
            color: #00f2ff;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid #00f2ff;
        }

        /* Pantallas de Superposición */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(10,10,30,0.9) 0%, rgba(0,0,0,0.95) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: 100px;
            color: #00f2ff;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 20px #00f2ff, 0 0 40px #0055ff;
        }

        p {
            font-size: 24px;
            max-width: 600px;
            line-height: 1.5;
            color: #aaa;
            margin-bottom: 30px;
        }

        button {
            padding: 25px 60px;
            font-size: 32px;
            cursor: pointer;
            background: transparent;
            border: 4px solid #00f2ff;
            color: #00f2ff;
            border-radius: 15px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        button:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 40px #00f2ff;
            transform: scale(1.05);
        }

        /* Efecto de Scanline para estética de proyector */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div id="ui-layer">
        <div class="stat">PUNTOS: <span id="score">0</span></div>
        <div class="stat">TIEMPO: <span id="timer">30</span>s</div>
    </div>

    <!-- Pantalla de Inicio -->
    <div id="start-screen" class="overlay">
        <h1>ROBOT ATTACK</h1>
        <p>¡Invasión detectada! Toca a los robots en la pared para destruirlos. <br>Tienes 30 segundos para obtener la puntuación más alta.</p>
        <button onclick="startGame()">INICIAR SISTEMA</button>
    </div>

    <!-- Pantalla de Fin -->
    <div id="end-screen" class="overlay" style="display:none;">
        <h1>MISIÓN FINALIZADA</h1>
        <p id="final-score" style="font-size: 45px; color: #fff; margin: 20px 0;"></p>
        <button onclick="location.reload()">REINICIAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let robots = [];
        let particles = [];

        // Ajustar tamaño al proyector
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.alpha = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Robot {
            constructor() {
                this.size = 70 + Math.random() * 60;
                this.x = Math.random() * (canvas.width - this.size);
                this.y = canvas.height + this.size; // Aparecen desde abajo
                this.targetY = Math.random() * (canvas.height - this.size);
                this.speed = 2 + Math.random() * 4;
                this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
                this.wobble = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.size/2, this.y + this.size/2);
                ctx.rotate(Math.sin(this.wobble) * 0.1);
                
                // Cuerpo metálico
                ctx.fillStyle = "#333";
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);

                // Ojos brillantes
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(-this.size/4, -this.size/4, this.size/8, 0, Math.PI * 2);
                ctx.arc(this.size/4, -this.size/4, this.size/8, 0, Math.PI * 2);
                ctx.fill();
                
                // Boca / Rejilla
                ctx.fillStyle = "rgba(255,255,255,0.1)";
                ctx.fillRect(-this.size/3, 0, (this.size/3)*2, this.size/4);

                ctx.restore();
            }

            update() {
                this.y -= this.speed;
                this.wobble += 0.1;
            }
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            score = 0;
            timeLeft = 30;
            robots = [];
            spawnRobot();
            countdown();
            update();
        }

        function spawnRobot() {
            if(!gameActive) return;
            robots.push(new Robot());
            // Se acelera la aparición según avanza el tiempo
            let delay = Math.max(300, 1000 - (30 - timeLeft) * 20);
            setTimeout(spawnRobot, delay);
        }

        function countdown() {
            let timerInterval = setInterval(() => {
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame();
                } else {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                }
            }, 1000);
        }

        function createExplosion(x, y, color) {
            for(let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar y actualizar robots
            for(let i = robots.length - 1; i >= 0; i--) {
                robots[i].update();
                robots[i].draw();
                if(robots[i].y < -robots[i].size) robots.splice(i, 1);
            }

            // Partículas de explosión
            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if(particles[i].alpha <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(update);
        }

        // Evento de "Tocar" (Click/Tap)
        function handleInput(clientX, clientY) {
            if(!gameActive) return;
            
            for(let i = robots.length - 1; i >= 0; i--) {
                let r = robots[i];
                if(clientX >= r.x && clientX <= r.x + r.size &&
                   clientY >= r.y && clientY <= r.y + r.size) {
                    
                    createExplosion(r.x + r.size/2, r.y + r.size/2, r.color);
                    robots.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = score;
                    break; // Solo destruye uno por toque
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        });

        function endGame() {
            gameActive = false;
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = "PUNTUACIÓN: " + score;
        }
    </script>
</body>
</html>
